name: "build-test-pubtodockerhub"

env:
  DOCKERHUB_IMAGE_PREFIX: abesesr/item

on:
  push:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-test-pubtodockerhub-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout source code"
        uses: actions/checkout@v4

      - name: "Setup Java"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: "Run tests"
        run: mvn -B -ntp verify

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout source code"
        uses: actions/checkout@v4

      - name: "Setup QEMU"
        uses: docker/setup-qemu-action@v3

      - name: "Setup Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Prepare API image metadata"
        id: docker_tag_meta_api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE_PREFIX }}-api

      - name: "Prepare Batch image metadata"
        id: docker_tag_meta_batch
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE_PREFIX }}-batch

      - name: "Login to DockerHub"
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build and push API image"
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api-image
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.docker_tag_meta_api.outputs.tags }}
          labels: ${{ steps.docker_tag_meta_api.outputs.labels }}
          cache-from: type=gha,scope=item-api-image
          cache-to: type=gha,mode=max,scope=item-api-image

      - name: "Build and push Batch image"
        uses: docker/build-push-action@v6
        with:
          context: .
          target: batch-image
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.docker_tag_meta_batch.outputs.tags }}
          labels: ${{ steps.docker_tag_meta_batch.outputs.labels }}
          cache-from: type=gha,scope=item-batch-image
          cache-to: type=gha,mode=max,scope=item-batch-image
