name: 'Create release'

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Version de la release (semver)'
        required: true
        default: 'x.x.x'

permissions:
  contents: write

concurrency:
  group: create-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 'Setup Java'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: "Calculate versions"
        id: calculate-version
        shell: bash
        run: |
          set -euo pipefail
          releaseVersion=${{ inputs.releaseVersion }}
          major=$(echo "${releaseVersion}" | cut -d. -f1)
          minor=$(echo "${releaseVersion}" | cut -d. -f2)
          patch=$(echo "${releaseVersion}" | cut -d. -f3)
          patch=$((patch + 1))
          snapshotVersion="${major}.${minor}.${patch}-SNAPSHOT"
          echo "snapshotVersion=${snapshotVersion}" >> $GITHUB_OUTPUT

      - name: 'Verify release is created only on "main" or "master" git branch'
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]

      - name: 'Verify version is semver formatted (X.X.X)'
        env:
          NEW_TAG:  ${{ github.event.inputs.releaseVersion }}
          NEW_SNAPSHOT_TAG: ${{ steps.calculate-version.outputs.snapshotVersion }}
        shell: bash
        run: |
          set -euo pipefail
          echo "$NEW_TAG" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$'
          echo "$NEW_SNAPSHOT_TAG" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-SNAPSHOT$'

      - name: 'Verify version is not already used as a git tag'
        env:
          NEW_TAG:  ${{ github.event.inputs.releaseVersion }}
        shell: bash
        run: |
          set -euo pipefail
          ! git rev-parse -q --verify "refs/tags/${NEW_TAG}"

      - name: 'Generate the new version (patch files + git tag)'
        env:
          NEW_TAG: ${{ github.event.inputs.releaseVersion }}
          NEW_SNAPSHOT_TAG: ${{ steps.calculate-version.outputs.snapshotVersion }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "github-action@noreply"
          git config user.name "GitHub Action"

          mvn -B -ntp versions:set -DnewVersion="$NEW_TAG" -DgenerateBackupPoms=false
          git add .
          git commit -m "Version $NEW_TAG"
          git tag "$NEW_TAG"

          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "$NEW_TAG"

          git fetch origin develop
          git switch develop
          git reset --hard origin/develop
          git merge --no-ff "origin/${GITHUB_REF_NAME}" -m "Merge ${GITHUB_REF_NAME} to develop [skip ci]"

          mvn -B -ntp versions:set -DnewVersion="$NEW_SNAPSHOT_TAG" -DgenerateBackupPoms=false
          git add .
          git commit -m "Version $NEW_SNAPSHOT_TAG [skip ci]"
          git push origin develop

      - name: 'Create the github release'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.releaseVersion }}
          generate_release_notes: true
